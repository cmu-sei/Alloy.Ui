<h1 mat-dialog-title>{{ title }}</h1>
<mat-dialog-content>
  <p class="message-text">{{ message }}</p>
</mat-dialog-content>

<mat-dialog-actions>
  @if (buttonTrueText !== '') {
    <button
      mat-stroked-button
      hotkeyAction="ENTER"
      (click)="onClick(true)"
      tabindex="3"
      >
      {{ buttonTrueText }}
    </button>
  }
  <button mat-stroked-button (click)="onCancel()" tabindex="3">
    {{ buttonFalseText }}
  </button>
</mat-dialog-actions>
